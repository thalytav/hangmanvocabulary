<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tebak Kata — Hangman Kosakata Inggris</title>

    <!-- Vendor lokal (offline) -->
    <link rel="stylesheet" href="assets/vendor/bootstrap.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Panggung rasio 16:9 -->
    <div class="stage-wrap">
      <div class="stage" id="stage">

        <!-- ================= LAYAR MULAI ================= -->
        <section class="screen screen-start active" id="screen-start">
          <div class="start-inner">
            <div class="brand">
              <span class="brand-badge">EDU</span>
              <h1 class="brand-title">Tebak&nbsp;Kata</h1>
              <p class="brand-sub">Hangman Kosakata Indonesia – Inggris</p>
            </div>

            <p class="pick-label">Pilih kategori</p>
            <div class="cat-grid" id="cat-grid"><!-- diisi JS --></div>

            <button class="btn-play" id="btn-start">Mulai Bermain</button>
            <p class="hint-foot">Tebak ejaan kata dari artinya. Salah 6 kali = kalah.</p>
          </div>
        </section>

        <!-- ================= LAYAR GAME ================= -->
        <section class="screen screen-game" id="screen-game">
          <!-- Bar atas: stats -->
          <header class="topbar">
            <button class="chip chip-ghost" id="btn-back" title="Kembali ke menu">‹ Menu</button>
            <div class="chip" id="chip-cat">Kategori</div>
            <div class="stat-group">
              <div class="chip chip-stat"><span class="stat-ico">★</span><span id="stat-score">0</span></div>
              <div class="chip chip-stat"><span class="stat-ico">🔥</span><span id="stat-streak">0</span></div>
              <div class="chip chip-stat" id="chip-timer"><span class="stat-ico">⏱</span><span id="stat-timer">30</span></div>
            </div>
          </header>

          <!-- Area utama: figur + kata -->
          <div class="play-area">
            <!-- Figur hangman -->
            <div class="figure-box">
              <svg viewBox="0 0 200 250" class="figure-container" preserveAspectRatio="xMidYMid meet">
                <line x1="60" y1="20" x2="140" y2="20" />
                <line x1="140" y1="20" x2="140" y2="50" />
                <line x1="60" y1="20" x2="60" y2="230" />
                <line x1="20" y1="230" x2="100" y2="230" />
                <circle cx="140" cy="70" r="20" class="figure-part" />
                <line x1="140" y1="90" x2="140" y2="150" class="figure-part" />
                <line x1="140" y1="120" x2="120" y2="100" class="figure-part" />
                <line x1="140" y1="120" x2="160" y2="100" class="figure-part" />
                <line x1="140" y1="150" x2="120" y2="180" class="figure-part" />
                <line x1="140" y1="150" x2="160" y2="180" class="figure-part" />
              </svg>
              <div class="lives" id="lives"></div>
            </div>

            <!-- Petunjuk + kata + keyboard -->
            <div class="word-side">
              <div class="clue-card">
                <span class="clue-lang" id="clue-lang">Bahasa Indonesia</span>
                <span class="clue-text" id="clue-text">—</span>
                <span class="ask-lang" id="ask-lang">Tebak kata Inggris-nya</span>
              </div>

              <div class="word" id="word"><!-- huruf diisi JS --></div>

              <div class="wrong-line">
                <span class="wrong-label">Salah:</span>
                <span id="wrong-letters" class="wrong-letters"></span>
              </div>

              <div class="keyboard" id="keyboard"><!-- tombol A-Z diisi JS --></div>

              <button class="btn-skip" id="btn-skip">Lewati kata ⏭</button>
            </div>
          </div>
        </section>

        <!-- ================= POPUP HASIL KATA ================= -->
        <div class="overlay" id="overlay">
          <div class="result-card" id="result-card">
            <div class="result-emoji" id="result-emoji">🎉</div>
            <h2 class="result-title" id="result-title">Benar!</h2>
            <p class="result-word" id="result-word"></p>
            <p class="result-gain" id="result-gain"></p>
            <button class="btn-next" id="btn-next">Kata Berikutnya →</button>
          </div>
        </div>

        <!-- ================= POPUP SELESAI SESI ================= -->
        <div class="overlay" id="overlay-end">
          <div class="result-card">
            <div class="result-emoji">🏆</div>
            <h2 class="result-title">Sesi Selesai!</h2>
            <p class="result-word" id="end-summary"></p>
            <button class="btn-next" id="btn-restart">Main Lagi</button>
          </div>
        </div>

        <!-- Toast notifikasi -->
        <div class="toast-note" id="toast-note">Huruf itu sudah kamu pilih</div>

      </div>
    </div>

    <!-- Scripts lokal (offline) -->
    <script src="assets/vendor/jquery.min.js"></script>
    <script src="assets/vendor/bootstrap.bundle.min.js"></script>
    <script src="assets/data/data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
