<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Vocab Hunt - Kosakata Indonesia-Inggris</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="game-wrapper">
      <div class="game-container">
        <!-- Header -->
        <div class="header-section">
          <div class="row h-100 align-items-center">
            <div class="col-md-6">
              <h1 class="game-title">
                <i class="fas fa-book"></i> Vocab Hunt
              </h1>
              <p class="game-subtitle">Tebak Kosakata Inggris dari Hint Indonesia</p>
            </div>
            <div class="col-md-6 text-end">
              <div class="stats-container">
                <div class="stat-item">
                  <span class="stat-label">Benar:</span>
                  <span class="stat-value" id="correct-count">0</span>
                </div>
                <div class="stat-item">
                  <span class="stat-label">Salah:</span>
                  <span class="stat-value wrong" id="wrong-count">0</span>
                </div>
                <div class="stat-item">
                  <span class="stat-label">Kategori:</span>
                  <span class="stat-value" id="category-name">-</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Main Game Area -->
        <div class="game-area">
          <div class="row h-100">
            <!-- Left: Hangman Figure -->
            <div class="col-md-4 d-flex align-items-center justify-content-center">
              <svg viewBox="0 0 220 280" class="figure-container">
                <!-- rod -->
                <line x1="60" y1="20" x2="140" y2="20" stroke-width="4"/>
                <line x1="140" y1="20" x2="140" y2="50" stroke-width="4"/>
                <line x1="60" y1="20" x2="60" y2="230" stroke-width="4"/>
                <line x1="20" y1="230" x2="100" y2="230" stroke-width="4"/>
                <!-- head -->
                <circle cx="140" cy="70" r="20" class="figure-part" stroke-width="4"/>
                <!-- body -->
                <line x1="140" y1="90" x2="140" y2="150" class="figure-part" stroke-width="4"/>
                <!-- arms -->
                <line x1="140" y1="120" x2="120" y2="100" class="figure-part" stroke-width="4"/>
                <line x1="140" y1="120" x2="160" y2="100" class="figure-part" stroke-width="4"/>
                <!-- legs -->
                <line x1="140" y1="150" x2="120" y2="180" class="figure-part" stroke-width="4"/>
                <line x1="140" y1="150" x2="160" y2="180" class="figure-part" stroke-width="4"/>
              </svg>
            </div>

            <!-- Center: Game Content -->
            <div class="col-md-4 d-flex flex-column align-items-center justify-content-center game-content">
              <!-- Hint -->
              <div class="hint-box">
                <p class="hint-label">Hint (Indonesia):</p>
                <h2 id="hint-text" class="hint-text">Loading...</h2>
              </div>

              <!-- Word Display -->
              <div class="word-display-container">
                <div class="word" id="word"></div>
              </div>

              <!-- Wrong Letters -->
              <div class="wrong-letters-info">
                <p class="small-label">Huruf Salah:</p>
                <div id="wrong-letters" class="wrong-letters-list"></div>
              </div>
            </div>

            <!-- Right: Difficulty & Message -->
            <div class="col-md-4 d-flex flex-column align-items-center justify-content-center">
              <div class="difficulty-box">
                <span class="difficulty-label">Tingkat Kesulitan:</span>
                <span class="difficulty-badge" id="difficulty-badge">Beginner</span>
              </div>
              
              <div class="message-box mt-4" id="message-box" style="display: none;">
                <h3 id="message-text"></h3>
                <p id="answer-text"></p>
              </div>
            </div>
          </div>
        </div>

        <!-- Keyboard Section -->
        <div class="keyboard-section">
          <div class="keyboard-container" id="keyboard-container"></div>
        </div>

        <!-- Bottom Controls -->
        <div class="bottom-controls">
          <button class="btn btn-primary btn-lg" id="play-button">
            <i class="fas fa-redo"></i> Main Lagi
          </button>
          <button class="btn btn-secondary btn-lg" id="hint-button" title="Gunakan hint tambahan">
            <i class="fas fa-lightbulb"></i> Bantuan
          </button>
          <button class="btn btn-info btn-lg" id="skip-button" title="Lewati kata ini">
            <i class="fas fa-forward"></i> Lewati
          </button>
        </div>
      </div>
    </div>

    <!-- Notification -->
    <div class="notification-container" id="notification-container">
      <p id="notification-text"></p>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="script.js"></script>
  </body>
</html>
